<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root{
  --paper:#F6F4EE;
  --grid:#D8DEE9;
  --ink:#1C2B3A;
  --ink-soft:#5B6B7A;
  --urgent:#C0392B;
  --urgent-bg:#FBE0DC;
  --overdue:#7A1F14;
  --overdue-bg:#F3C9C2;
  --done:#3E7A5C;
  --done-bg:#DCEEE3;
  --accent:#2E5C8A;
}
*{box-sizing:border-box;}
body{margin:0;}
.wrap{
  font-family:'IBM Plex Sans Thai',sans-serif;
  background:
    linear-gradient(var(--grid) 1px,transparent 1px) 0 0/100% 28px,
    linear-gradient(90deg,var(--grid) 1px,transparent 1px) 0 0/28px 100%,
    var(--paper);
  min-height:100vh;
  color:var(--ink);
  padding:32px 20px 60px;
}
.container{max-width:760px;margin:0 auto;}
.header{
  border-bottom:2px solid var(--ink);
  padding-bottom:14px;
  margin-bottom:24px;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
}
.header h1{
  font-size:26px;
  font-weight:700;
  margin:0;
  letter-spacing:-0.02em;
}
.header .sub{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  color:var(--ink-soft);
}
.log-no{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  color:var(--ink-soft);
}

.add-form{
  background:#fff;
  border:1.5px solid var(--ink);
  border-radius:6px;
  padding:16px;
  margin-bottom:28px;
  display:grid;
  grid-template-columns:1fr 160px auto;
  gap:10px;
  box-shadow:3px 3px 0 var(--grid);
}
.add-form input{
  font-family:'IBM Plex Sans Thai',sans-serif;
  font-size:14px;
  padding:10px 12px;
  border:1px solid #C4CCD6;
  border-radius:4px;
  background:var(--paper);
  color:var(--ink);
}
.add-form input:focus{outline:2px solid var(--accent);outline-offset:1px;}
.add-form button{
  font-family:'IBM Plex Sans Thai',sans-serif;
  font-weight:600;
  font-size:14px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:4px;
  padding:10px 20px;
  cursor:pointer;
  transition:transform .1s;
}
.add-form button:hover{transform:translateY(-1px);}
.add-form button:active{transform:translateY(0);}
.add-form .full-row{grid-column:1/-1;font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;}

.entries{display:flex;flex-direction:column;gap:10px;}
.entry{
  background:#fff;
  border:1px solid #C4CCD6;
  border-left:5px solid var(--ink-soft);
  border-radius:5px;
  padding:14px 16px;
  display:flex;
  align-items:center;
  gap:14px;
  position:relative;
}
.entry.urgent{border-left-color:var(--urgent);background:var(--urgent-bg);}
.entry.overdue{border-left-color:var(--overdue);background:var(--overdue-bg);}
.entry.done{border-left-color:var(--done);background:var(--done-bg);opacity:.75;}

.entry .stamp{
  position:absolute;
  top:8px;
  right:12px;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  font-weight:700;
  letter-spacing:.05em;
  padding:2px 8px;
  border:1.5px solid var(--urgent);
  color:var(--urgent);
  border-radius:3px;
  transform:rotate(4deg);
}
.entry.overdue .stamp{border-color:var(--overdue);color:var(--overdue);}

.check{
  width:22px;height:22px;
  border:2px solid var(--ink-soft);
  border-radius:50%;
  flex:none;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  background:#fff;
}
.entry.done .check{background:var(--done);border-color:var(--done);color:#fff;font-size:13px;}

.entry .info{flex:1;min-width:0;}
.entry .name{
  font-weight:600;font-size:15px;
  text-decoration:none;
}
.entry.done .name{text-decoration:line-through;color:var(--ink-soft);}
.entry .meta{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;color:var(--ink-soft);
  margin-top:3px;
}

.entry .days{
  font-family:'JetBrains Mono',monospace;
  font-weight:700;font-size:13px;
  min-width:64px;text-align:right;
}
.entry.urgent .days,.entry.overdue .days{color:inherit;}

.del{
  background:none;border:none;color:var(--ink-soft);
  cursor:pointer;font-size:16px;padding:4px 6px;line-height:1;
}
.del:hover{color:var(--overdue);}

.empty{
  text-align:center;color:var(--ink-soft);
  padding:40px 0;font-family:'JetBrains Mono',monospace;font-size:13px;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="container">
    <div class="header">
      <div>
        <h1>สมุดเช็คงาน</h1>
        <div class="sub">Atom's Task Log</div>
      </div>
      <div class="log-no" id="logNo">ENTRY — 000</div>
    </div>

    <div class="add-form">
      <input id="taskName" type="text" placeholder="ชื่องาน เช่น เขียนรายงาน Rice Kettlebells">
      <input id="dueDate" type="date">
      <button id="addBtn">+ เพิ่มงาน</button>
      <div class="full-row" id="formNote">แดง = เหลือ ≤2 วัน · แดงเข้ม = เลยกำหนด · เขียว = เสร็จแล้ว</div>
    </div>

    <div class="entries" id="entries"></div>
    <div class="empty" id="emptyMsg" style="display:none;">— ยังไม่มีงาน เพิ่มงานแรกด้านบนได้เลย —</div>
  </div>
</div>

<script>
let tasks = [];

function daysLeft(dateStr){
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(dateStr + 'T00:00:00');
  return Math.round((due - today) / 86400000);
}
function fmtDate(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('th-TH', {day:'2-digit',month:'2-digit',year:'2-digit'});
}

const STORAGE_KEY = 'atom-task-tracker-tasks';

async function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    tasks = raw ? JSON.parse(raw) : [];
  }catch(e){ tasks = []; }
  render();
}

async function save(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }catch(e){ console.error('save failed', e); }
}

function render(){
  const container = document.getElementById('entries');
  const empty = document.getElementById('emptyMsg');
  document.getElementById('logNo').textContent = 'ENTRY — ' + String(tasks.length).padStart(3,'0');

  const sorted = [...tasks].sort((a,b)=>{
    if(a.done !== b.done) return a.done ? 1 : -1;
    return new Date(a.due) - new Date(b.due);
  });

  container.innerHTML = '';
  empty.style.display = tasks.length === 0 ? 'block' : 'none';

  sorted.forEach(t=>{
    const dl = daysLeft(t.due);
    let cls = '', stamp = '';
    if(!t.done && dl < 0){ cls = 'overdue'; stamp = 'เลยกำหนด'; }
    else if(!t.done && dl <= 2){ cls = 'urgent'; stamp = 'ด่วน'; }
    if(t.done) cls = 'done';

    const el = document.createElement('div');
    el.className = 'entry ' + cls;
    el.innerHTML = `
      ${stamp ? `<div class="stamp">${stamp}</div>` : ''}
      <div class="check" data-id="${t.id}">${t.done ? '✓' : ''}</div>
      <div class="info">
        <div class="name">${escapeHtml(t.name)}</div>
        <div class="meta">กำหนดส่ง ${fmtDate(t.due)}</div>
      </div>
      <div class="days">${t.done ? 'เสร็จแล้ว' : (dl < 0 ? `เลย ${Math.abs(dl)} วัน` : dl === 0 ? 'วันนี้' : `เหลือ ${dl} วัน`)}</div>
      <button class="del" data-id="${t.id}">✕</button>
    `;
    container.appendChild(el);
  });

  container.querySelectorAll('.check').forEach(c=>{
    c.addEventListener('click', ()=>toggleDone(c.dataset.id));
  });
  container.querySelectorAll('.del').forEach(b=>{
    b.addEventListener('click', ()=>deleteTask(b.dataset.id));
  });
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function addTask(){
  const nameEl = document.getElementById('taskName');
  const dateEl = document.getElementById('dueDate');
  const name = nameEl.value.trim();
  const due = dateEl.value;
  if(!name || !due) return;
  tasks.push({ id: Date.now().toString(), name, due, done:false });
  nameEl.value = '';
  dateEl.value = '';
  await save();
  render();
}

async function toggleDone(id){
  const t = tasks.find(x=>x.id===id);
  if(t){ t.done = !t.done; await save(); render(); }
}

async function deleteTask(id){
  tasks = tasks.filter(x=>x.id!==id);
  await save();
  render();
}

document.getElementById('addBtn').addEventListener('click', addTask);
document.getElementById('taskName').addEventListener('keydown', e=>{ if(e.key==='Enter') addTask(); });
document.getElementById('dueDate').addEventListener('keydown', e=>{ if(e.key==='Enter') addTask(); });

load();
</script>
</body>
</html>
